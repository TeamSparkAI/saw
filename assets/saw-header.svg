<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, Monaco, monospace">
  <defs>
    <!-- Light fill for dark bg; dark stroke so it reads on white too -->
    <style>
      .saw-title { font-size: 42px; font-weight: 700; letter-spacing: 0.08em; fill: #f2f2f2; stroke: #1a1a1a; stroke-width: 1.2; stroke-linejoin: round; paint-order: stroke fill; }
      .saw-subtitle { font-size: 13px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; fill: #e0e0e0; stroke: #1a1a1a; stroke-width: 0.8; stroke-linejoin: round; paint-order: stroke fill; }
    </style>
  </defs>
  <g text-anchor="middle">
    <text class="saw-title" x="160" y="42">&lt;SAW&gt;</text>
    <text class="saw-subtitle" x="160" y="72">Spec-Agent Workflow</text>
  </g>
</svg>
